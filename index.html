<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GOES Data Explorer — NOAA/SWPC</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root{
      --bg:#0b0f17;--panel:#11182a;--panel2:#161f35;--text:#e7eefc;--muted:#9fb0d0;
      --accent:#4a9eff;--stroke:rgba(231,238,252,0.95);
      --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
      --hover:rgba(255,255,255,0.06);--axis:rgba(255,255,255,0.25);
    }
    [data-theme="light"]{
      --bg:#f5f7fa;--panel:#ffffff;--panel2:#f0f2f5;--text:#1a1a2e;--muted:#6b7280;
      --accent:#3b82f6;--stroke:rgba(26,26,46,0.90);
      --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.15);
      --hover:rgba(0,0,0,0.04);--axis:rgba(0,0,0,0.25);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
    header{padding:14px 14px 6px;max-width:1440px;margin:0 auto}
    .title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
    .theme-btn,.lang-btn{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:5px 11px;cursor:pointer;font-size:16px;color:var(--text);transition:all .2s}
    .theme-btn:hover,.lang-btn:hover{background:var(--hover)}
    .row{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;margin-bottom:8px}
    .chip{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:9px 11px;display:flex;gap:8px;align-items:center;transition:background .3s}
    label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    select,button,input{appearance:none;border-radius:8px;border:1px solid var(--border2);background:var(--hover);color:var(--text);padding:7px 10px;font-size:13px;font-family:inherit;transition:all .2s}
    select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,0.15)}
    button{cursor:pointer;font-weight:500}
    button:hover{background:rgba(74,158,255,0.15);border-color:var(--accent)}
    .period-group{display:flex;flex-wrap:wrap;gap:3px}
    .pbtn{padding:5px 9px;border-radius:7px;font-size:11.5px;font-weight:600;border:1px solid var(--border2);background:var(--hover);color:var(--text);cursor:pointer;transition:all .12s;min-width:32px;text-align:center;line-height:1.3}
    .pbtn:hover{background:rgba(74,158,255,0.12);border-color:var(--accent)}
    .pbtn.active{background:rgba(74,158,255,0.22);border-color:var(--accent);color:var(--accent)}
    .pbtn.disabled{opacity:.25;pointer-events:none}
    .pbtn.nf{opacity:.45}.pbtn.nf.hd{opacity:1}
    .pbtn.nf::after{content:"↑";font-size:7px;vertical-align:super;margin-left:1px}
    .pbtn.nf.hd::after{content:""}
    details{background:var(--panel);border:1px solid var(--border);border-radius:12px;transition:background .3s}
    details summary{padding:9px 13px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);user-select:none;list-style:none}
    details summary::-webkit-details-marker{display:none}
    details summary::before{content:"▸ "}
    details[open] summary::before{content:"▾ "}
    .panel-body{padding:2px 13px 13px}
    .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
    .si label{margin-bottom:3px}
    .si input[type="range"]{width:100%;padding:3px 0;background:transparent;border:none}
    .si input[type="color"]{width:38px;height:28px;padding:2px;border-radius:6px}
    .sr{display:flex;gap:7px;align-items:center}
    .drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:16px;text-align:center;color:var(--muted);font-size:13px;transition:all .2s;cursor:pointer;margin-top:6px}
    .drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(74,158,255,0.06)}
    .drop-zone input[type="file"]{display:none}
    .slevels{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .sbox{display:flex;gap:4px;align-items:center;padding:4px 7px;border-radius:7px;border:1px solid var(--border);background:var(--hover);font-size:11px;color:var(--muted)}
    .sbox input{transform:scale(1.05)}
    .status{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.4}
    .wrap{padding:0 14px 8px;max-width:1440px;margin:0 auto}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:8px;overflow:hidden;transition:background .3s}
    svg{width:100%;height:auto;display:block}
    .toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:4px 14px 6px;max-width:1440px;margin:0 auto;align-items:center}
    .toolbar button{font-size:11px;padding:5px 10px}
    .hint{font-size:11.5px;color:var(--muted);padding:4px 14px 18px;max-width:1440px;margin:0 auto;line-height:1.5}
    .hint a{color:var(--accent)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
    .badge.live{background:rgba(52,211,153,0.2);color:#34d399}
    .badge.file{background:rgba(251,191,36,0.2);color:#fbbf24}
    .selection{fill:rgba(74,158,255,0.12);stroke:rgba(74,158,255,0.30)}
    .handle{fill:rgba(74,158,255,0.30)}
    .bio-tbl{width:100%;border-collapse:collapse;font-size:11px;line-height:1.35}
    .bio-tbl th{text-align:left;padding:5px 6px;border-bottom:1px solid var(--border2);color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
    .bio-tbl td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:top}
    .bio-tbl tr:last-child td{border-bottom:none}
    .bio-tbl tbody tr{transition:background .15s;cursor:default}
    .bio-tbl tbody tr:hover{background:rgba(74,158,255,0.06)}
    [data-theme="light"] .bio-tbl tbody tr:hover{background:rgba(59,130,246,0.06)}
    .bio-dot{display:inline-block;width:9px;height:9px;border-radius:9px;margin-right:3px;vertical-align:middle}
    .bio-sev{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
    .bio-none{color:var(--muted);font-style:italic;padding:8px 0}
    .bio-wiki{text-decoration:none;font-size:13px;vertical-align:middle;margin-left:4px}
    .bio-wiki:hover{opacity:.7}
    @media(max-width:640px){.sgrid{grid-template-columns:1fr}input[type="date"]{min-width:120px}}
  </style>
</head>

<body data-theme="dark">
<header>
  <div class="title-row">
    <h1 id="pageTitle">GOES Data Explorer — NOAA/SWPC</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="badge live" id="dataBadge">LIVE</span>
      <button class="lang-btn" id="langBtn" title="Language">🌐</button>
      <button class="theme-btn" id="themeBtn" title="Theme">◐</button>
    </div>
  </div>

  <div class="row">
    <div class="chip" style="flex:1 1 100%">
      <div style="width:100%">
        <label id="periodLabel"></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:5px">
          <span style="font-size:10px;color:var(--muted);min-width:28px">Live</span>
          <div class="period-group" id="livePresets"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:7px">
          <span style="font-size:10px;color:var(--muted);min-width:28px" id="fileLabel"></span>
          <div class="period-group" id="filePresets"></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <input id="startDate" type="date" style="min-width:140px"/>
          <input id="startTime" type="time" value="00:00" style="min-width:90px"/>
          <span style="color:var(--muted)">→</span>
          <input id="endDate" type="date" style="min-width:140px"/>
          <input id="endTime" type="time" value="23:59" style="min-width:90px"/>
          <button id="applyRangeBtn"></button>
          <button id="resetZoomBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="chip">
      <div>
        <label id="productLabel"></label>
        <select id="productSel"></select>
      </div>
    </div>
    <div class="chip">
      <div>
        <label id="channelLabel"></label>
        <select id="energySel"></select>
      </div>
    </div>
    <div class="chip">
      <div>
        <label id="refreshLabel"></label>
        <select id="refreshSel"></select>
      </div>
      <button id="reloadBtn">⟳</button>
    </div>
    <div class="chip" style="flex:1 1 240px" id="sLevelChip">
      <div style="width:100%">
        <label id="sLevelLabel"></label>
        <div class="slevels" id="sLevelControls"></div>
      </div>
    </div>
  </div>

  <div class="row" style="gap:8px">
    <details id="displaySettings" style="flex:1 1 420px">
      <summary id="displaySummary"></summary>
      <div class="panel-body">
        <div class="sgrid">
          <div class="si">
            <label id="lineColorLabel"></label>
            <div class="sr">
              <input type="color" id="lineColorPick" value="#e7eefc"/>
              <span id="lineColorVal" class="mono" style="font-size:11px;color:var(--muted)">#e7eefc</span>
            </div>
          </div>
          <div class="si">
            <label><span id="lineWidthText"></span>: <span id="lineWidthVal">2.2</span></label>
            <input type="range" id="lineWidthRange" min="0.5" max="6" step="0.1" value="2.2"/>
          </div>
          <div class="si">
            <label><span id="lineOpacityText"></span>: <span id="lineOpacityVal">0.95</span></label>
            <input type="range" id="lineOpacityRange" min="0.1" max="1" step="0.05" value="0.95"/>
          </div>
          <div class="si">
            <label id="curveLabel"></label>
            <select id="curveTypeSel"></select>
          </div>
          <div class="si">
            <label id="dataPointsLabel"></label>
            <div class="sr">
              <input type="checkbox" id="showPointsCb"/>
              <span id="showPointsText" style="font-size:11px;color:var(--muted)"></span>
              <input type="range" id="pointSizeRange" min="1" max="8" step="0.5" value="3" style="flex:1"/>
              <span id="pointSizeVal" style="font-size:11px;color:var(--muted)">3</span>
            </div>
          </div>
          <div class="si">
            <label id="gridLabel"></label>
            <div class="sr">
              <input type="checkbox" id="showGridCb" checked/>
              <span id="showGridText" style="font-size:11px;color:var(--muted)"></span>
              <input type="range" id="gridOpacityRange" min="0.02" max="0.30" step="0.01" value="0.08" style="flex:1"/>
            </div>
          </div>
          <div class="si">
            <label id="thresholdsLabel"></label>
            <div class="sr">
              <input type="checkbox" id="showThresholdsCb" checked/>
              <span id="showThresholdsText" style="font-size:11px;color:var(--muted)"></span>
            </div>
          </div>
          <div class="si">
            <label id="yAxisLabel"></label>
            <select id="yAxisMode"></select>
            <div class="sr" id="yManualRow" style="margin-top:5px;display:none">
              <input type="number" id="yMinInput" placeholder="Y min" style="width:80px"/>
              <input type="number" id="yMaxInput" placeholder="Y max" style="width:80px"/>
            </div>
          </div>
        </div>
      </div>
    </details>

    <details id="nceiPanel" style="flex:1 1 340px">
      <summary id="nceiSummary"></summary>
      <div class="panel-body">
        <div id="nceiDesc" style="font-size:11px;color:var(--muted);margin-bottom:8px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">
          <div>
            <label id="nceiFromLabel"></label>
            <div style="display:flex;gap:4px">
              <select id="nceiYearFrom" style="width:80px"></select>
              <select id="nceiMonFrom" style="width:60px"></select>
            </div>
          </div>
          <div>
            <label id="nceiToLabel"></label>
            <div style="display:flex;gap:4px">
              <select id="nceiYearTo" style="width:80px"></select>
              <select id="nceiMonTo" style="width:60px"></select>
            </div>
          </div>
          <button id="nceiLoadBtn"></button>
          <button id="nceiAbortBtn" style="display:none"></button>
        </div>
        <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap" id="nceiQuickBtns"></div>
        <div id="nceiProgress" style="font-size:11px;color:var(--muted);margin-top:6px"></div>
      </div>
    </details>

    <details id="dataPanel" style="flex:1 1 280px">
      <summary id="dataPanelSummary"></summary>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone">
          <div style="font-size:22px;margin-bottom:4px">📂</div>
          <div id="dropText"></div>
          <div id="dropFormats" style="font-size:10px;margin-top:3px"></div>
          <input type="file" id="fileInput" accept=".json,.csv,.txt,.dat"/>
        </div>
        <div style="margin-top:8px">
          <label id="customUrlLabel"></label>
          <div style="display:flex;gap:6px">
            <input type="text" id="customUrl" placeholder="https://..." style="flex:1"/>
            <button id="fetchUrlBtn"></button>
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
          <button id="exportPngBtn">📷 PNG</button>
          <button id="exportCsvBtn">📊 CSV</button>
          <button id="exportSvgBtn">📋 SVG</button>
          <button id="clearFileBtn" style="margin-left:auto"></button>
        </div>
        <div id="fileInfo" style="font-size:10.5px;color:var(--muted);margin-top:7px"></div>
      </div>
    </details>
  </div>

  <div class="status" id="status"></div>
</header>

<div class="wrap">
  <div class="card">
    <svg id="chart" viewBox="0 0 1080 560" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</div>

<div class="wrap">
  <details id="bioPanel" open style="margin-bottom:8px">
    <summary id="bioSummary"></summary>
    <div class="panel-body" id="bioContent"></div>
  </details>
</div>

<div class="toolbar">
  <div style="font-size:11px;color:var(--muted)" id="pointInfo"></div>
</div>

<div class="hint" id="hintBlock"></div>

<script>

/* ══════════ PARSING ══════════ */

function parseApiRows(raw,prod){
  if(prod.special==='mag') return parseMag(raw);
  return raw.map(d=>{
    const tt=d.time_tag;
    const ch=prod.chField?(d[prod.chField]||'').toString().trim():'value';
    const fx=d[prod.vField];
    return{t:tt?new Date(tt):null,energy:ch,v:fx==null||fx===''?NaN:+fx};
  }).filter(d=>d.t instanceof Date&&!isNaN(d.t));
}

function parseMag(raw){
  const comps=['He','Hp','Hn','total'],rows=[];
  for(const d of raw){
    const tt=d.time_tag?new Date(d.time_tag):null;
    if(!tt||isNaN(tt))continue;
    for(const c of comps){if(d[c]!=null)rows.push({t:tt,energy:c,v:+d[c]});}
  }
  return rows;
}

function parseGenericJson(raw){
  return raw.map(d=>{
    const tt=d.time_tag||d.time||d.timestamp||d.date;
    const en=(d.energy||d.channel||d.label||d.line||'').toString().trim();
    const fx=d.flux??d.value??d.pfu??d.flux_pfu??d.fluence??d.background;
    return{t:tt?new Date(tt):null,energy:en||'value',v:fx==null||fx===''?NaN:+fx};
  }).filter(d=>d.t instanceof Date&&!isNaN(d.t));
}

function parseCsv(txt){
  const lines=txt.trim().split('\n');
  let hi=0;
  while(hi<lines.length&&/^[#:]/.test(lines[hi].trim()))hi++;
  if(hi>=lines.length-1)return[];
  const sep=lines[hi].includes('\t')?'\t':lines[hi].includes(';')?';':',';
  const hdr=lines[hi].split(sep).map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const tC=hdr.findIndex(h=>/^(time_tag|time|timestamp|date|datetime|t)$/.test(h));
  const fC=hdr.findIndex(h=>/^(flux|value|pfu|flux_pfu|proton_flux|fluence|background|v|y|total)$/.test(h));
  const eC=hdr.findIndex(h=>/^(energy|channel|label|line|e)$/.test(h));
  const ti=tC<0?0:tC,fi=fC<0?1:fC;
  return lines.slice(hi+1).map(l=>{
    const p=l.split(sep).map(s=>s.trim().replace(/"/g,''));
    if(p.length<=Math.max(ti,fi))return null;
    const dt=new Date(p[ti]),v=+p[fi];
    const en=eC>=0&&p[eC]?p[eC]:'value';
    return{t:dt,energy:en,v};
  }).filter(d=>d&&d.t instanceof Date&&!isNaN(d.t));
}

function parseSpace(txt){
  const rows=[];
  for(const line of txt.trim().split('\n')){
    if(/^[#:]/.test(line.trim())||!line.trim())continue;
    const p=line.trim().split(/\s+/);if(p.length<5)continue;
    const y=+p[0],m=+p[1],d=+p[2];
    if(y<1970||y>2100||m<1||m>12||d<1||d>31)continue;
    const hm=p[3].padStart(4,'0');
    const dt=new Date(Date.UTC(y,m-1,d,+hm.slice(0,2),+hm.slice(2)));
    for(let i=4;i<p.length;i++){const v=+p[i];if(isFinite(v)&&v>0&&v<1e12){rows.push({t:dt,energy:'value',v});break;}}
  }
  return rows;
}

function autoParse(txt,fn){
  const ext=(fn||'').split('.').pop().toLowerCase();
  if(ext==='json'||txt.trim()[0]==='['){try{const j=JSON.parse(txt);if(Array.isArray(j))return parseGenericJson(j);}catch(e){}}
  let r=parseCsv(txt);if(r.length)return r;
  r=parseSpace(txt);if(r.length)return r;
  return parseCsv(txt);
}

function pickE(rows,ew,allowNeg){
  let f=rows.filter(d=>(d.energy||'').toString().trim()===ew).filter(d=>isFinite(d.v)&&(allowNeg||d.v>0)).sort((a,b)=>a.t-b.t);
  if(!f.length&&rows.length){
    const es=[...new Set(rows.map(d=>d.energy))];
    if(es.length===1)f=rows.filter(d=>isFinite(d.v)&&(allowNeg||d.v>0)).sort((a,b)=>a.t-b.t);
  }
  return f;
}

function discoverChannels(data){
  return[...new Set(data.map(d=>d.energy).filter(Boolean))];
}

function populateChannelSel(channels){
  energySel.innerHTML='';
  channels.forEach(ch=>{

    energySel.appendChild(o);

  const prod=curProd();
  if(prod.sLevels&&channels.includes('>=10 MeV')){energySel.value='>=10 MeV';ST.energy='>=10 MeV';}
  else if(channels.length){energySel.value=channels[0];ST.energy=channels[0];}
}

/* ─────────── downsample ─────────── */
function ds(data,max){
  if(data.length<=max)return data;
  const bs=Math.ceil(data.length/(max/2)),res=[data[0]];
  for(let i=0;i<data.length;i+=bs){
    const b=data.slice(i,Math.min(i+bs,data.length));if(!b.length)continue;
    const mn=b.reduce((a,c)=>a.v<c.v?a:c),mx=b.reduce((a,c)=>a.v>c.v?a:c);
    if(mn!==mx){mn.t<mx.t?res.push(mn,mx):res.push(mx,mn);}else res.push(mn);
  }
  res.push(data[data.length-1]);return res;
}

/* ─────────── domain helpers ─────────── */
function clampD(dom){
  if(!ST.fullDomain)return dom;
  const a=new Date(Math.max(+dom[0],+ST.fullDomain[0])),b=new Date(Math.min(+dom[1],+ST.fullDomain[1]));
  return+a>=+b?ST.fullDomain:[a,b];
}
const pad2=n=>String(n).padStart(2,'0');
function setInputs(dom){
  $('startDate').value=`${dom[0].getFullYear()}-${pad2(dom[0].getMonth()+1)}-${pad2(dom[0].getDate())}`;
  $('startTime').value=`${pad2(dom[0].getHours())}:${pad2(dom[0].getMinutes())}`;
  $('endDate').value=`${dom[1].getFullYear()}-${pad2(dom[1].getMonth()+1)}-${pad2(dom[1].getDate())}`;
  $('endTime').value=`${pad2(dom[1].getHours())}:${pad2(dom[1].getMinutes())}`;
}
function getInputDom(){
  const sd=$('startDate').value,st=$('startTime').value||'00:00',ed=$('endDate').value,et=$('endTime').value||'23:59';
  if(!sd||!ed)return null;
  const a=new Date(`${sd}T${st}`),b=new Date(`${ed}T${et}`);
  return(isNaN(a)||isNaN(b)||+a>=+b)?null:[a,b];
}

function tc(){

  return{

    tbg:dk?'rgba(17,24,42,0.96)':'rgba(255,255,255,0.96)',
    tbr:dk?'rgba(255,255,255,0.10)':'rgba(0,0,0,0.10)',
    t1:dk?'rgba(231,238,252,0.95)':'rgba(26,26,46,0.95)',
    t2:dk?'rgba(159,176,208,0.95)':'rgba(107,114,128,0.95)'
  };
}

/* ─────────── s-intervals ─────────── */
function sIntervals(ser){
  const out={S1:[],S2:[],S3:[],S4:[],S5:[]};if(!ser.length)return out;
  const lvOf=v=>{for(let i=SL.length-1;i>=0;i--)if(v>=SL[i].thr)return SL[i].id;return null;};
  let cur=null;
  for(let i=0;i<ser.length;i++){
    const id=lvOf(ser[i].v);
    if(!id){if(cur){out[cur.id].push({a:cur.s,b:ser[i-1].t});cur=null;}continue;}
    if(!cur)cur={id,s:ser[i].t};
    else if(cur.id!==id){out[cur.id].push({a:cur.s,b:ser[i-1].t});cur={id,s:ser[i].t};}
  }
  if(cur)out[cur.id].push({a:cur.s,b:ser[ser.length-1].t});
  return out;
}
function lvLabel(v){
  if(!sActive())return'';
  for(let i=SL.length-1;i>=0;i--)if(v>=SL[i].thr)return'  '+SL[i].id;
  return'  <S1';
}

/* ─────────── bio helpers ─────────── */
function curBioEntry(){
  const p=curProd();
  return BIO.find(b=>b.prod===p.id&&(b.ch===null||b.ch===ST.energy))||BIO.find(b=>b.prod===p.id)||null;
}
function curBioLevels(){const e=curBioEntry();return e?e.levels:[];}

/* ─────────── bio highlight (table hover → chart) ─────────── */
function highlightBio(idx){
  gH.selectAll('*').remove();
  const bio=curBioLevels();
  if(!bio.length||idx<0||idx>=bio.length)return;
  const lv=bio[idx];
  if(lv.v==null||lv.isInfo)return;
  const yDom=yS.domain();
  if(lv.v<yDom[0]||lv.v>yDom[1])return;
  const nextV=(idx+1<bio.length&&bio[idx+1].v!=null&&!bio[idx+1].isInfo)?bio[idx+1].v:yDom[1];
  const y1=yS(Math.min(nextV,yDom[1]));
  const y2=yS(Math.max(lv.v,yDom[0]));
  gH.append('rect').attr('x',0).attr('width',iW)
    .attr('y',y1).attr('height',Math.max(0,y2-y1))
    .attr('fill',lv.color).attr('fill-opacity',0.28);
  gH.append('line').attr('x1',0).attr('x2',iW)
    .attr('y1',yS(lv.v)).attr('y2',yS(lv.v))
    .attr('stroke',lv.color).attr('stroke-width',3).attr('stroke-opacity',0.9);
  gH.append('text').attr('x',8).attr('y',yS(lv.v)-6)
    .attr('fill',lv.color).attr('font-size',13).attr('font-weight',700)
    .text(t(lv.id));
}
function unhighlightBio(){gH.selectAll('*').remove();}

function renderBioPanel(){
  const el=$('bioContent');
  const entry=curBioEntry();
  if(!entry||!entry.levels.length){
    el.innerHTML=`<div class="bio-none">${entry&&entry.note?t(entry.note):t(TX.bioNone)}</div>`;
    return;
  }
  let h='';
  if(entry.note){
    const wikiUrl=entry.wiki?t(entry.wiki):null;
    const wikiLink=wikiUrl?` <a href="${wikiUrl}" target="_blank" class="bio-wiki" title="Wikipedia">📖</a>`:'';
    h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">${t(entry.note)}${wikiLink}</div>`;
  }
  h+=`<table class="bio-tbl"><thead><tr>
    <th style="width:90px">${t(TX.tblThreshold)}</th><th style="width:100px">${t(TX.tblLevel)}</th>
    <th>🌿 ${t(TX.tblFlora)}</th><th>🐾 ${t(TX.tblFauna)}</th><th>👤 ${t(TX.tblHumans)}</th></tr></thead><tbody>`;
  for(const lv of entry.levels){
    const val=lv.v!=null?(lv.v<0.01?lv.v.toExponential(1):lv.v)+' '+entry.unit:'—';
    h+=`<tr>
      <td><span class="bio-dot" style="background:${lv.color}"></span><strong>${t(lv.id)}</strong><br><span class="mono" style="font-size:10px;color:var(--muted)">${val}</span></td>
      <td><span class="bio-sev" style="color:${lv.color}">${t(lv.sev)}</span></td>
      <td>${t(lv.flora)}</td><td>${t(lv.fauna)}</td><td>${t(lv.humans)}</td></tr>`;
  }
  h+='</tbody></table>';
  el.innerHTML=h;
  el.querySelectorAll('.bio-tbl tbody tr').forEach((tr,idx)=>{
    tr.addEventListener('mouseenter',()=>highlightBio(idx));
    tr.addEventListener('mouseleave',unhighlightBio);
  });
}

/* ══════════ RENDER ══════════ */
function render(){
  gB.selectAll('*').remove();gG.selectAll('*').remove();gA.selectAll('*').remove();
  gT.selectAll('*').remove();gH.selectAll('*').remove();gL.selectAll('*').remove();
  gO.selectAll('*').remove();gBr.selectAll('*').remove();
  if(!ST.fullSeries.length||!ST.currentDomain){statusEl.textContent=t(TX.noData);$('pointInfo').textContent='';return;}

  const prod=curProd();
  const useLog=prod.logY;
  const allowNeg=!useLog;

  const raw=ST.fullSeries.filter(d=>d.t>=ST.currentDomain[0]&&d.t<=ST.currentDomain[1]);
  if(!raw.length){statusEl.textContent=t(TX.noRange);return;}

  const ser=ds(raw,3000);
  const c=tc();

  xS.domain(ST.currentDomain);

  let yMin,yMax;
  if(useLog){
    yS=d3.scaleLog().range([iH,0]).clamp(true);
    if(ST.yMode==='manual'&&ST.yMin!=null&&ST.yMax!=null){yMin=Math.max(1e-12,ST.yMin);yMax=Math.max(yMin*10,ST.yMax);}
    else if(ST.yMode==='full'){yMin=1e-3;yMax=1e6;}
    else{const mn=d3.min(raw,d=>d.v),mx=d3.max(raw,d=>d.v);yMin=Math.max(1e-12,mn*.8);yMax=Math.max(yMin*10,mx*1.2);}
  }else{
    yS=d3.scaleLinear().range([iH,0]);
    if(ST.yMode==='manual'&&ST.yMin!=null&&ST.yMax!=null){yMin=ST.yMin;yMax=ST.yMax;}
    else{const mn=d3.min(raw,d=>d.v),mx=d3.max(raw,d=>d.v);const pad=(mx-mn)*0.1||1;yMin=mn-pad;yMax=mx+pad;}
  }
  yS.domain([yMin,yMax]);

  /* S bands (time-based, only integral protons >=10 MeV) */
  if(sActive()){
    const iv=sIntervals(raw),bd=[];
    Object.keys(iv).forEach(id=>{if(!ST.sOn[id])return;iv[id].forEach(s=>bd.push({id,a:s.a,b:s.b}));});
    gB.selectAll('rect.sb').data(bd).enter().append('rect').attr('class','sb')
      .attr('x',d=>xS(d.a)).attr('y',0)
      .attr('width',d=>Math.max(1,xS(d.b)-xS(d.a))).attr('height',iH)
      .attr('fill',d=>SF[d.id]).attr('stroke',d=>SS[d.id]).attr('stroke-width',1);
  }

  /* Bio threshold zones — permanent horizontal colored bands for ALL products */
  if(ST.showThr){
    const bio=curBioLevels().filter(lv=>lv.v!=null&&!lv.isInfo);
    const yDom=yS.domain();
    const zones=[];
    for(let i=0;i<bio.length;i++){
      const lv=bio[i];
      if(lv.v>yDom[1]||lv.v<yDom[0])continue;
      const top=(i+1<bio.length&&bio[i+1].v!=null)?Math.min(bio[i+1].v,yDom[1]):yDom[1];
      const bot=Math.max(lv.v,yDom[0]);
      const y1=yS(top),y2=yS(bot);
      if(y2-y1>0)zones.push({y1,h:y2-y1,color:lv.color});
    }
    gB.selectAll('rect.bz').data(zones).enter().append('rect').attr('class','bz')
      .attr('x',0).attr('y',d=>d.y1).attr('width',iW).attr('height',d=>d.h)
      .attr('fill',d=>d.color).attr('fill-opacity',0.10);
  }

  /* grid */
  if(ST.showGrid){
    const yt=useLog?yS.ticks(9).filter(t=>t>0):yS.ticks(10);
    gG.selectAll('line').data(yt).enter().append('line')
      .attr('x1',0).attr('x2',iW).attr('y1',d=>yS(d)).attr('y2',d=>yS(d))
      .attr('stroke',ST.theme==='dark'?'#fff':'#000').attr('stroke-opacity',ST.gridOp);
  }

  /* tick format */
  const spanD=(ST.currentDomain[1]-ST.currentDomain[0])/864e5;
  let tFmt,tN;
  if(spanD<=1){tFmt=d3.utcFormat('%H:%M');tN=8;}
  else if(spanD<=7){tFmt=d3.utcFormat('%m-%d %H:%M');tN=6;}
  else if(spanD<=90){tFmt=d3.utcFormat('%Y-%m-%d');tN=7;}
  else if(spanD<=730){tFmt=d3.utcFormat('%Y-%m');tN=8;}
  else{tFmt=d3.utcFormat('%Y');tN=8;}

  /* axes */
  gA.append('g').attr('transform',`translate(0,${iH})`).call(d3.axisBottom(xS).ticks(tN).tickFormat(tFmt))
    .call(s=>{s.selectAll('text').attr('fill',c.txt).attr('font-size',11);s.selectAll('path,line').attr('stroke',c.ax);});
  const yAxisGen=useLog?d3.axisLeft(yS).ticks(9,'~g'):d3.axisLeft(yS).ticks(10);
  gA.append('g').call(yAxisGen)
    .call(s=>{s.selectAll('text').attr('fill',c.txt).attr('font-size',11);s.selectAll('path,line').attr('stroke',c.ax);});
  gA.append('text').attr('transform','rotate(-90)').attr('x',-iH/2).attr('y',-58)
    .attr('text-anchor','middle').attr('fill',c.tt).attr('font-size',12).text(prod.unit);

  /* bio-impact threshold lines */
  if(ST.showThr){
    const bio=curBioLevels();
    const th=bio.filter(d=>d.v!=null&&d.v>=yS.domain()[0]&&d.v<=yS.domain()[1]);
    const tg=gT.selectAll('g').data(th).enter().append('g');
    tg.append('line').attr('x1',0).attr('x2',iW).attr('y1',d=>yS(d.v)).attr('y2',d=>yS(d.v))
      .attr('stroke',d=>d.color||c.tl).attr('stroke-opacity',.55).attr('stroke-dasharray','6,4').attr('stroke-width',1.5);
    tg.append('text').attr('x',iW-6).attr('y',d=>yS(d.v)-5).attr('text-anchor','end')
      .attr('fill',d=>d.color||c.tt).attr('font-size',11).attr('font-weight',600)
      .text(d=>`${t(d.id)}: ${d.v<0.01?d.v.toExponential(0):d.v} ${prod.unit}`);
  }

  /* line */
  const cf=CURVES[ST.curve]||d3.curveMonotoneX;
  const lineGen=d3.line().x(d=>xS(d.t)).y(d=>yS(d.v)).curve(cf);
  if(useLog) lineGen.defined(d=>d.v>0);
  gL.append('path').datum(ser).attr('fill','none')
    .attr('stroke',ST.lineColor).attr('stroke-width',ST.lineWidth).attr('stroke-opacity',ST.lineOpacity)
    .attr('d',lineGen);

  /* points */
  if(ST.showPts&&ser.length<2000){
    gL.selectAll('circle').data(ser.filter(d=>!useLog||d.v>0)).enter().append('circle')
      .attr('cx',d=>xS(d.t)).attr('cy',d=>yS(d.v)).attr('r',ST.ptSize)
      .attr('fill',ST.lineColor).attr('fill-opacity',ST.lineOpacity*.7);
  }

  /* tooltip */
  const ov=gO.append('rect').attr('width',iW).attr('height',iH).attr('fill','transparent');
  const tip=gO.append('g').style('display','none');
  tip.append('line').attr('y1',0).attr('y2',iH).attr('stroke',c.ch).attr('stroke-dasharray','4,4');
  const tDot=tip.append('circle').attr('r',4).attr('fill',ST.lineColor).attr('stroke',c.tbg).attr('stroke-width',2);
  const tBox=tip.append('g');
  tBox.append('rect').attr('rx',10).attr('ry',10).attr('fill',c.tbg).attr('stroke',c.tbr);
  const t1=tBox.append('text').attr('fill',c.t1).attr('font-size',13);
  const t2=tBox.append('text').attr('fill',c.t2).attr('font-size',12);
  const bis=d3.bisector(d=>d.t).left;

  function showTip(ev){
    const[mx]=d3.pointer(ev,ov.node()),t0=xS.invert(mx);
    const i=Math.min(raw.length-1,Math.max(0,bis(raw,t0))),d=raw[i];
    tip.style('display',null);
    const px=xS(d.t),py=yS(d.v);
    tip.select('line').attr('x1',px).attr('x2',px);
    tDot.attr('cx',px).attr('cy',py);
    const l1=`${ST.energy}  ${fN(d.v)} ${prod.unit}${lvLabel(d.v)}`,l2=fU(d.t);
    t1.text(l1).attr('x',12).attr('y',20);t2.text(l2).attr('x',12).attr('y',40);
    const w=Math.max(260,l1.length*7.2),h=54;
    const xP=px>iW*.6?px-w-18:px+18,yP=Math.min(iH-h-10,Math.max(10,py-h/2));
    tBox.attr('transform',`translate(${xP},${yP})`);
    tBox.select('rect').attr('width',w).attr('height',h);
  }
  ov.on('pointerenter',()=>tip.style('display',null))
    .on('pointermove',showTip)
    .on('pointerleave',()=>tip.style('display','none'));

  /* brush */
  gBr.call(d3.brushX().extent([[0,0],[iW,iH]]).on('end',ev=>{
    if(!ev.selection)return;
    ST.currentDomain=[xS.invert(ev.selection[0]),xS.invert(ev.selection[1])];
    setInputs(ST.currentDomain);render();
  }));

  /* status */
  const tMin=raw[0].t,tMax=raw[raw.length-1].t,last=raw[raw.length-1];
  statusEl.innerHTML=
    `${t(TX.product)}: <span class="mono">${t(prod.label)}</span>, ${t(TX.channelS)}: <span class="mono">${ST.energy}</span>, ${t(TX.points)}: <span class="mono">${raw.length}</span>`+
    (ser.length<raw.length?` (${t(TX.rendered)}: ${ser.length})`:'')+`<br>`+
    `${t(TX.window)}: <span class="mono">${fU(tMin)}</span> → <span class="mono">${fU(tMax)}</span><br>`+
    `${t(TX.last)}: <span class="mono">${fN(last.v)} ${prod.unit}</span> @ <span class="mono">${fU(last.t)}</span>`+
    (sActive()?` (${lvLabel(last.v).trim()})`:'');
  $('pointInfo').innerHTML=
    `${t(TX.total)}: <span class="mono">${ST.fullSeries.length}</span> · `+
    `${t(TX.source)}: <span class="badge ${ST.src}">${ST.src==='api'?'LIVE':'FILE'}</span>`;
}

function updateFromSrc(){
  const src=ST.src==='file'?ST.fileData:ST.apiData;
  const prod=curProd();
  ST.fullSeries=pickE(src,ST.energy,!prod.logY);
  if(!ST.fullSeries.length){ST.fullDomain=null;ST.currentDomain=null;render();return;}
  ST.fullDomain=d3.extent(ST.fullSeries,d=>d.t);
  ST.currentDomain=ST.currentDomain?clampD(ST.currentDomain):ST.fullDomain;
  setInputs(ST.currentDomain);updSCtrl();renderBioPanel();render();
}

function resolveRange(desired){
  const prod=curProd();
  if(prod.ranges.includes(desired))return desired;
  return prod.ranges[prod.ranges.length-1];
}

async function loadLive(apiRange){
  const prod=curProd();
  const actualRange=resolveRange(apiRange);
  ST.src='api';
  dataBadge.textContent='LIVE';dataBadge.className='badge live';
  statusEl.textContent=t(TX.loading);
  const url=`https://services.swpc.noaa.gov/json/goes/primary/${prod.id}-${actualRange}.json?_=${Date.now()}`;
  try{
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok)throw new Error(`HTTP ${r.status} — ${url}`);
    const raw=await r.json();
    ST.apiData=parseApiRows(raw,prod);
    const channels=discoverChannels(ST.apiData);
    populateChannelSel(channels);
    ST.currentDomain=null;
    renderBioPanel();
    updateFromSrc();
  }catch(e){statusEl.textContent=`${t(TX.error)}: ${e.message}`;}
  updLivePresetState();updHighlight();
}

function loadFileView(data,fn){
  ST.fileData=data;ST.src='file';ST.currentDomain=null;

  const channels=discoverChannels(data);

/* ══════════ NCEI ARCHIVE LOADER ══════════ */

const NCEI_BASE='https://www.ncei.noaa.gov/data/goes-space-environment-monitor/access/avg';

const NCEI_SAT_MAP=[
  {from:2011,to:2020,sat:15,type:'cpflux'},
  {from:2003,to:2010,sat:13,type:'cpflux',fallback:[{sat:12,type:'eps'},{sat:11,type:'eps'}]},
  {from:1995,to:2002,sat:8, type:'eps',  fallback:[{sat:10,type:'eps'}]},
  {from:1986,to:1994,sat:7, type:'eps',  fallback:[{sat:6,type:'eps'}]},
  {from:1983,to:1985,sat:6, type:'eps',  fallback:[{sat:5,type:'eps'}]},
  {from:1974,to:1982,sat:5, type:'eps',  fallback:[{sat:2,type:'eps'},{sat:1,type:'eps'}]},
];

const EPS_MAP={p1_flux_ic:'>=1 MeV',p2_flux_ic:'>=5 MeV',p3_flux_ic:'>=10 MeV',p4_flux_ic:'>=30 MeV',p5_flux_ic:'>=50 MeV',p6_flux_ic:'>=60 MeV',p7_flux_ic:'>=100 MeV'};
const CPFLUX_MAP={ZPGT1E:'>=1 MeV',ZPGT5E:'>=5 MeV',ZPGT10E:'>=10 MeV',ZPGT30E:'>=30 MeV',ZPGT50E:'>=50 MeV',ZPGT60E:'>=60 MeV',ZPGT100E:'>=100 MeV'};

function nceiSatForYear(year){
  for(const e of NCEI_SAT_MAP) if(year>=e.from&&year<=e.to) return e;
  return null;
}

function nceiUrl(year,month,satNum,type){
  const mm=String(month).padStart(2,'0');
  const sn=String(satNum).padStart(2,'0');
  const d2=new Date(year,month,0);
  const ds=`${year}${mm}01`,de=`${year}${mm}${String(d2.getDate()).padStart(2,'0')}`;
  if(type==='cpflux')
    return `${NCEI_BASE}/${year}/${mm}/goes${sn}/csv/g${sn}_epead_cpflux_5m_${ds}_${de}.csv`;
  return `${NCEI_BASE}/${year}/${mm}/goes${sn}/csv/g${sn}_eps_5m_${ds}_${de}.csv`;
}

function parseNceiCsv(text,type){
  const lines=text.split('\n');
  let dataStart=-1;
  for(let i=0;i<lines.length;i++){if(lines[i].trim()==='data:'){dataStart=i+1;break;}}
  if(dataStart<0||dataStart>=lines.length)return[];

  const header=lines[dataStart].split(',').map(s=>s.trim());
  const colMap=type==='cpflux'?CPFLUX_MAP:EPS_MAP;
  const cols=[];
  for(const[col,energy]of Object.entries(colMap)){
    const idx=header.indexOf(col);
    if(idx>=0)cols.push({idx,energy});
  }
  if(!cols.length)return[];

  const timeIdx=header.indexOf('time_tag');
  if(timeIdx<0)return[];

  const rows=[];
  for(let i=dataStart+1;i<lines.length;i++){
    const parts=lines[i].split(',');
    if(parts.length<=timeIdx)continue;
    const tt=new Date(parts[timeIdx].trim().replace(' ','T')+'Z');
    if(isNaN(tt))continue;
    for(const c of cols){
      const v=parseFloat(parts[c.idx]);
      if(isFinite(v)&&v>0) rows.push({t:tt,energy:c.energy,v});
    }
  }
  return rows;
}

let nceiAbort=null;

async function loadNceiRange(yearFrom,monFrom,yearTo,monTo){
  const progEl=$('nceiProgress');
  const loadBtn=$('nceiLoadBtn');
  const abortBtn=$('nceiAbortBtn');
  const months=[];

  for(let y=yearFrom;y<=yearTo;y++){
    const m1=(y===yearFrom?monFrom:1),m2=(y===yearTo?monTo:12);
    for(let m=m1;m<=m2;m++) months.push({y,m});
  }
  if(!months.length){progEl.textContent=t(TX.badRange);return;}
  if(months.length>600){progEl.textContent=t(TX.tooLarge);return;}

  loadBtn.style.display='none';abortBtn.style.display='';
  const controller=new AbortController();
  nceiAbort=controller;

  let allRows=[],loaded=0,failed=0;

  for(const{y,m}of months){
    if(controller.signal.aborted)break;
    progEl.textContent=`${t(TX.loading).replace('…','')} ${y}-${String(m).padStart(2,'0')}… (${loaded}/${months.length})`;

    const entry=nceiSatForYear(y);
    if(!entry){failed++;continue;}

    const attempts=[{sat:entry.sat,type:entry.type},...(entry.fallback||[])];
    let ok=false;

    for(const att of attempts){
      if(controller.signal.aborted)break;
      const url=nceiUrl(y,m,att.sat,att.type);
      try{
        const r=await fetch(url,{signal:controller.signal,cache:'force-cache'});
        if(!r.ok)continue;
        const txt=await r.text();
        const rows=parseNceiCsv(txt,att.type);
        if(rows.length){allRows=allRows.concat(rows);ok=true;break;}
      }catch(e){if(e.name==='AbortError')break;}
    }
    if(!ok)failed++;
    loaded++;
  }

  nceiAbort=null;
  loadBtn.style.display='';abortBtn.style.display='none';

  if(controller.signal.aborted){progEl.textContent=t(TX.cancelled);return;}
  if(!allRows.length){
    progEl.textContent=L==='en'
      ?`Failed to load data (${failed} months without data).`
      :`Не удалось загрузить данные (${failed} мес. без данных).`;
    return;
  }

  progEl.textContent=`${t(TX.done)}: ${allRows.length} ${t(TX.records)}, ${loaded-failed}/${months.length} ${t(TX.months)}, ${failed} ${t(TX.skipped)}.`;
  loadFileView(allRows,`NCEI ${yearFrom}-${String(monFrom).padStart(2,'0')} → ${yearTo}-${String(monTo).padStart(2,'0')}`);
}

function schedRefresh(){

  const s=+refreshSel.value;

    ST.timer=setInterval(()=>{
      if(ST.src==='api'){
        const p=LIVE_P.find(x=>x.r===ST.preset);
        if(p)loadLive(p.r);
      }
    },s*1000);
  }
}

/* ─────────── settings persistence ─────────── */
function saveSt(){
  try{localStorage.setItem('goes_dx_s',JSON.stringify({
    product:ST.product,energy:ST.energy,
    lineColor:ST.lineColor,lineWidth:ST.lineWidth,lineOpacity:ST.lineOpacity,curve:ST.curve,
    showPts:ST.showPts,ptSize:ST.ptSize,showGrid:ST.showGrid,gridOp:ST.gridOp,showThr:ST.showThr,
    yMode:ST.yMode,yMin:ST.yMin,yMax:ST.yMax,theme:ST.theme,sOn:ST.sOn,lang:L
  }));}catch(e){}
}
function loadSt(){
  try{
    const r=localStorage.getItem('goes_dx_s');if(!r)return;
    const s=JSON.parse(r);
    if(s.product){ST.product=s.product;productSel.value=s.product;}
    if(s.lineColor){ST.lineColor=s.lineColor;$('lineColorPick').value=s.lineColor;$('lineColorVal').textContent=s.lineColor;}
    if(s.lineWidth!=null){ST.lineWidth=s.lineWidth;$('lineWidthRange').value=s.lineWidth;$('lineWidthVal').textContent=s.lineWidth;}
    if(s.lineOpacity!=null){ST.lineOpacity=s.lineOpacity;$('lineOpacityRange').value=s.lineOpacity;$('lineOpacityVal').textContent=s.lineOpacity;}
    if(s.curve){ST.curve=s.curve;$('curveTypeSel').value=s.curve;}
    if(s.showPts!=null){ST.showPts=s.showPts;$('showPointsCb').checked=s.showPts;}
    if(s.ptSize!=null){ST.ptSize=s.ptSize;$('pointSizeRange').value=s.ptSize;$('pointSizeVal').textContent=s.ptSize;}
    if(s.showGrid!=null){ST.showGrid=s.showGrid;$('showGridCb').checked=s.showGrid;}
    if(s.gridOp!=null){ST.gridOp=s.gridOp;$('gridOpacityRange').value=s.gridOp;}
    if(s.showThr!=null){ST.showThr=s.showThr;$('showThresholdsCb').checked=s.showThr;}
    if(s.yMode){ST.yMode=s.yMode;$('yAxisMode').value=s.yMode;$('yManualRow').style.display=s.yMode==='manual'?'flex':'none';}
    if(s.yMin!=null){ST.yMin=s.yMin;$('yMinInput').value=s.yMin;}
    if(s.yMax!=null){ST.yMax=s.yMax;$('yMaxInput').value=s.yMax;}
    if(s.theme){ST.theme=s.theme;document.body.dataset.theme=s.theme;}
    if(s.sOn)ST.sOn=s.sOn;
    if(s.energy)ST.energy=s.energy;
    if(s.lang)L=s.lang;
  }catch(e){}
}

/* ─────────── theme ─────────── */
function toggleTheme(){
  ST.theme=ST.theme==='dark'?'light':'dark';
  document.body.dataset.theme=ST.theme;
  if(ST.theme==='light'&&ST.lineColor==='#e7eefc'){ST.lineColor='#1a1a2e';$('lineColorPick').value='#1a1a2e';$('lineColorVal').textContent='#1a1a2e';}
  else if(ST.theme==='dark'&&ST.lineColor==='#1a1a2e'){ST.lineColor='#e7eefc';$('lineColorPick').value='#e7eefc';$('lineColorVal').textContent='#e7eefc';}
  render();saveSt();
}

/* ─────────── language toggle ─────────── */
function toggleLang(){
  L=L==='en'?'ru':'en';
  applyLang();
  renderBioPanel();
  if(ST.fullSeries.length)render();
  saveSt();
}

/* ─────────── hint block ─────────── */
function renderHint(){
  $('hintBlock').innerHTML=
    `${t(TX.hintDrag)}<br>`+
    `${t(TX.hintLive)} <a href="https://services.swpc.noaa.gov/json/goes/primary/" target="_blank" class="mono">services.swpc.noaa.gov</a> ${t(TX.hintLiveD)}<br>`+
    `${t(TX.hintArch)} <a href="https://www.ncei.noaa.gov/data/goes-space-environment-monitor/access/avg/" target="_blank" class="mono">NCEI GOES SEM</a> —\n`+
    `${t(TX.hintArchD)}`;
}

/* ═══════════ applyLang ═══════════ */
function applyLang(){
  document.documentElement.lang=L;

  /* static labels */
  $('periodLabel').textContent=t(TX.period);
  $('fileLabel').textContent=t(TX.file);
  $('applyRangeBtn').textContent=t(TX.apply);
  $('resetZoomBtn').textContent=t(TX.reset);
  $('productLabel').textContent=t(TX.dataProduct);
  $('channelLabel').textContent=t(TX.channel);
  $('refreshLabel').textContent=t(TX.autoRefresh);
  $('sLevelLabel').textContent=t(TX.sLevel);
  $('displaySummary').textContent=t(TX.display);
  $('lineColorLabel').textContent=t(TX.lineColor);
  $('lineWidthText').textContent=t(TX.lineWidth);
  $('lineOpacityText').textContent=t(TX.lineOpacity);
  $('curveLabel').textContent=t(TX.curve);
  $('dataPointsLabel').textContent=t(TX.dataPoints);
  $('showPointsText').textContent=t(TX.show);
  $('gridLabel').textContent=t(TX.grid);
  $('showGridText').textContent=t(TX.show);
  $('thresholdsLabel').textContent=t(TX.thresholds);
  $('showThresholdsText').textContent=t(TX.showLines);
  $('yAxisLabel').textContent=t(TX.yAxis);
  $('nceiSummary').textContent=t(TX.nceiTitle);
  $('nceiFromLabel').textContent=t(TX.from);
  $('nceiToLabel').textContent=t(TX.to);
  $('nceiLoadBtn').textContent=t(TX.load);
  $('nceiAbortBtn').textContent=t(TX.cancel);
  $('dataPanelSummary').textContent=t(TX.fileExport);
  $('dropText').textContent=t(TX.dropHere);
  $('dropFormats').textContent=TX.dropFmt;
  $('customUrlLabel').textContent=t(TX.customUrl);
  $('fetchUrlBtn').textContent=t(TX.load);
  $('clearFileBtn').textContent=`✕ ${t(TX.clear)}`;
  $('bioSummary').textContent=t(TX.bioTitle);
  $('themeBtn').title=t(TX.theme);
  $('langBtn').title=t(TX.lang);

  /* NCEI description */
  $('nceiDesc').innerHTML=
    `${t(TX.nceiDesc)} <a href="https://www.ncei.noaa.gov/data/goes-space-environment-monitor/access/avg/" target="_blank" style="color:var(--accent)">NOAA NCEI</a>. `+
    t(TX.nceiDesc2);

  /* rebuild translated selects */
  buildProductSel();
  buildRefreshSel();
  buildCurveSel();
  buildYAxisSel();

  /* update file preset labels */
  updateFilePresetLabels();
  updateNceiQuickLabels();

  /* hint */
  renderHint();
}

/* ══════════ INIT ══════════ */
function init(){
  loadSt();

  /* build dynamic selects first */
  buildProductSel();
  buildRefreshSel();
  buildCurveSel();
  buildYAxisSel();

  /* build presets and controls */
  buildLP();buildFP();buildSC();updFilePr();buildNceiControls();

  /* apply language to all UI text */
  applyLang();

  const now=new Date();
  $('endDate').value=`${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;
  const d3a=new Date(+now-3*864e5);
  $('startDate').value=`${d3a.getFullYear()}-${pad2(d3a.getMonth()+1)}-${pad2(d3a.getDate())}`;

  $('themeBtn').addEventListener('click',toggleTheme);
  $('langBtn').addEventListener('click',toggleLang);

  productSel.addEventListener('change',()=>{
    ST.product=productSel.value;
    ST.currentDomain=null;
    updLivePresetState();
    const bestRange=resolveRange(LIVE_P.find(x=>x.r===ST.preset)?.r||'3-day');
    const preset=LIVE_P.find(x=>x.r===bestRange);
    if(preset)ST.preset=preset.r;
    loadLive(bestRange);
    saveSt();
  });

  energySel.addEventListener('change',()=>{ST.energy=energySel.value;ST.currentDomain=null;renderBioPanel();updateFromSrc();saveSt();});
  refreshSel.addEventListener('change',()=>{schedRefresh();});
  $('reloadBtn').addEventListener('click',()=>{
    if(ST.src==='api'){const p=LIVE_P.find(x=>x.r===ST.preset);if(p)loadLive(p.r);}
    else updateFromSrc();
  });

  $('applyRangeBtn').addEventListener('click',()=>{
    const dom=getInputDom();
    if(!dom){statusEl.textContent=t(TX.badPeriod);return;}
    if(ST.fileData.length){
      const prod=curProd();
      const fs=pickE(ST.fileData,ST.energy,!prod.logY),fd=fs.length?d3.extent(fs,d=>d.t):null;
      if(fd&&dom[0]>=new Date(+fd[0]-864e5)&&dom[1]<=new Date(+fd[1]+864e5)){
        if(ST.src!=='file'){ST.src='file';ST.fullSeries=fs;ST.fullDomain=fd;dataBadge.textContent='FILE';dataBadge.className='badge file';}
      }
    }
    if(!ST.fullDomain){statusEl.textContent=t(TX.noData);return;}
    ST.currentDomain=clampD(dom);setInputs(ST.currentDomain);ST.preset='';updHighlight();render();
  });
  $('resetZoomBtn').addEventListener('click',()=>{if(!ST.fullDomain)return;ST.currentDomain=ST.fullDomain;setInputs(ST.currentDomain);render();});

  /* display settings */
  const rs=()=>{render();saveSt();};
  $('lineColorPick').addEventListener('input',e=>{ST.lineColor=e.target.value;$('lineColorVal').textContent=e.target.value;rs();});
  $('lineWidthRange').addEventListener('input',e=>{ST.lineWidth=+e.target.value;$('lineWidthVal').textContent=e.target.value;rs();});
  $('lineOpacityRange').addEventListener('input',e=>{ST.lineOpacity=+e.target.value;$('lineOpacityVal').textContent=e.target.value;rs();});
  $('curveTypeSel').addEventListener('change',e=>{ST.curve=e.target.value;rs();});
  $('showPointsCb').addEventListener('change',e=>{ST.showPts=e.target.checked;rs();});
  $('pointSizeRange').addEventListener('input',e=>{ST.ptSize=+e.target.value;$('pointSizeVal').textContent=e.target.value;rs();});
  $('showGridCb').addEventListener('change',e=>{ST.showGrid=e.target.checked;rs();});
  $('gridOpacityRange').addEventListener('input',e=>{ST.gridOp=+e.target.value;rs();});
  $('showThresholdsCb').addEventListener('change',e=>{ST.showThr=e.target.checked;rs();});
  $('yAxisMode').addEventListener('change',e=>{ST.yMode=e.target.value;$('yManualRow').style.display=e.target.value==='manual'?'flex':'none';rs();});
  $('yMinInput').addEventListener('change',e=>{ST.yMin=e.target.value?+e.target.value:null;rs();});
  $('yMaxInput').addEventListener('change',e=>{ST.yMax=e.target.value?+e.target.value:null;rs();});

  /* file */
  const dz=$('dropZone'),fi=$('fileInput');
  dz.addEventListener('click',()=>fi.click());
  fi.addEventListener('change',()=>{if(fi.files[0])handleFile(fi.files[0]);});
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});

  $('clearFileBtn').addEventListener('click',()=>{
    ST.fileData=[];ST.src='api';$('fileInfo').textContent='';updFilePr();
    ST.currentDomain=null;
    const bestRange=resolveRange('3-day');
    loadLive(bestRange);ST.preset='3-day';updHighlight();
  });

  /* custom URL */
  $('fetchUrlBtn').addEventListener('click',async()=>{
    const url=$('customUrl').value.trim();if(!url){statusEl.textContent=t(TX.enterUrl);return;}
    statusEl.textContent=`${t(TX.loading).replace('…','')} ${url}…`;
    try{
      const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const ct=r.headers.get('content-type')||'';
      let data;
      if(ct.includes('json')){data=parseGenericJson(await r.json());}
      else{const txt=await r.text();data=autoParse(txt,'remote.csv');}
      if(!data.length){statusEl.textContent=t(TX.noDataFound);return;}
      loadFileView(data,url.split('/').pop()||'remote');
    }catch(e){statusEl.textContent=`${t(TX.error)}: ${e.message}`;}
  });

  /* export */
  $('exportPngBtn').addEventListener('click',exportPng);
  $('exportCsvBtn').addEventListener('click',exportCsv);
  $('exportSvgBtn').addEventListener('click',exportSvg);

  /* go */
  schedRefresh();
  const initRange=resolveRange('3-day');
  loadLive(initRange);ST.preset=initRange;updHighlight();
}

init();
})();
</script>
</body>
</html>
